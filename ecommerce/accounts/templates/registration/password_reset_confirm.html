{% extends "layout.html" %}

{% block content %}
<div class="container mt-5">
  <h2>Nouveau mot de passe</h2>

  {% if validlink %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-success">Changer le mot de passe</button>
    </form>
  {% else %}
    <p>Le lien est invalide ou expiré.</p>
  {% endif %}
</div>
{% endblock %}
